services:

  backend:
    container_name: codelensai-backend

    build:
      context: ./backend

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/docs >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  test:
    container_name: codelensai-contract-tests

    image: specmatic/enterprise:latest

    depends_on:
      backend:
        condition: service_healthy

    volumes:
      - ./:/usr/src/app

    command:
      - test
      - ./specs/codelensai.yaml
      - --testBaseURL=http://backend:8000