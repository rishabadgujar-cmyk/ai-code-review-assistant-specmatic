version: 3

systemUnderTest:
  service:
    $ref: "#/components/services/codeLensAI"

components:
  sources:
    localContracts:
      filesystem:
        directory: .

  services:
    codeLensAI:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - specs/codelensai.yaml

  runOptions:
    codeLensAITest:
      openapi:
        type: test
        baseUrl: http://backend:8000